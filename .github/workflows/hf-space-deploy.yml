name: Deploy HF Space

on:
  push:
    branches: [main]
    paths:
      - "space/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - name: Install huggingface_hub
        run: pip install huggingface_hub
      - name: Upload Space files
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::warning::HF_TOKEN secret not configured — Space not deployed"
            if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
              echo "::error::Add repo secret HF_TOKEN (write token from https://huggingface.co/settings/tokens)"
              exit 1
            fi
            exit 0
          fi
          python scripts/deploy_hf_space.py
