name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Pytest (no HF download)
        run: python -m pytest -q --tb=short -k "not distilgpt2"
        env:
          RUN_HF_TESTS: "0"

  dashboard-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: Install and build
        run: |
          npm ci
          npm run build

  benchmark-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Internal benchmark smoke
        run: python -m benchmarks.run_all --model hf-internal-testing/tiny-random-gpt2 --tiers internal
        env:
          RUN_BENCHMARK: internal
      - name: Upload manifest
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-manifest
          path: benchmarks/reports/latest_manifest.json
