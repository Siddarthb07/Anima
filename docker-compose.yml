services:
  api:
    build: .
    ports:
      - "8010:8010"
    command: ["python", "-m", "uvicorn", "api.server:app", "--host", "0.0.0.0", "--port", "8010"]
    volumes:
      - ./probes/zoo:/app/probes/zoo
      - ./data/narratives:/app/data/narratives
    environment:
      HF_TOKEN: ${HF_TOKEN:-}

  dashboard:
    build:
      context: ./dashboard
      args:
        VITE_WS_BASE: ${VITE_WS_BASE:-ws://localhost:8010}
    ports:
      - "8080:80"
    depends_on:
      - api
