server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /models {
        proxy_pass http://api:8010/models;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://api:8010/health;
    }

    location /generate {
        proxy_pass http://api:8010/generate;
        proxy_http_version 1.1;
        proxy_read_timeout 600s;
    }

    location /encode {
        proxy_pass http://api:8010/encode;
    }

    location /ws/ {
        proxy_pass http://api:8010/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 600s;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
